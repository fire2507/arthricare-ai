<!DOCTYPE html>
<html>

<head>
<title>ArthriCare AI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

<h1>🦴 ArthriCare AI</h1>
<p>Your Smart Arthritis Companion</p>

<h2>Log Today's Pain</h2>

<label>Pain Level</label>
<input type="range" min="1" max="10" id="pain">

<label>Body Area</label>
<select id="body">
<option>Knee</option>
<option>Hands</option>
<option>Back</option>
<option>Neck</option>
</select>

<label>Sleep Hours</label>
<input type="number" id="sleep" value="7">

<label>Weather</label>
<select id="weather">
<option>Warm</option>
<option>Cold</option>
<option>Rainy</option>
</select>

<button onclick="analyzePain()">Analyze Pain</button>

<div id="result"></div>

<h2>Exercise Suggestions</h2>

<div class="exercise">
<p>Finger Stretching</p>
<p>Knee Rotation</p>
<p>Gentle Yoga</p>
<p>Walking</p>
</div>

<h2>Pain History</h2>

<canvas id="chart"></canvas>

</div>

<script src="script.js"></script>
<script src="ai.js"></script>

</body>
</html>
